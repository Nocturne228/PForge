<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>PixelForge</title>
    <link rel="stylesheet" href="/static/style.css?v=30">
</head>
<body>
    <header>
        <div class="brand">
            <div class="p-toggle" id="modePill" data-active="pdf" role="button" tabindex="0" data-i18n-title="modePill.title">
                <span class="p-badge">p</span>
                <span class="p-suffix">
                    <span class="p-suffix-text active" data-page="pdf">df</span>
                    <span class="p-suffix-text" data-page="image">ic</span>
                </span>
            </div>
        </div>
        <div class="header-right">
            <div class="lang-toggle" id="langToggle" data-active="zh" role="button" tabindex="0" title="中文 / English">
                <span class="lang-opt active" data-lang="zh">中</span>
                <span class="lang-opt" data-lang="en">En</span>
            </div>
            <button id="shutdownBtn" class="shutdown-btn" data-i18n="shutdownBtn" data-i18n-title="shutdownBtn.title">关闭服务</button>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar" data-root="{{ home }}">
            <div class="sidebar-header">
                <h2 data-i18n="sidebar.title">目录浏览</h2>
                <button id="viewToggleBtn" class="view-toggle-btn" data-i18n-title="viewToggleBtn.title">
                    <svg class="icon-grid" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
                </button>
            </div>
            <div class="path-bar">
                <button id="rootBtn" class="btn btn-sm root-btn" data-i18n-title="rootBtn.title">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1L1 7h2v7h4v-4h2v4h4V7h2L8 1z"/></svg>
                </button>
                <button id="openFolderBtn" class="btn btn-sm" data-i18n-title="openFolderBtn.title">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h3.879a1.5 1.5 0 0 1 1.06.44L9 4H13.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5v-9z"/></svg>
                </button>
            </div>
            <div id="breadcrumb" class="breadcrumb"></div>
            <div id="fileTree" class="file-tree">
                <div class="loading" data-i18n="fileTree.loading">加载中...</div>
            </div>
            <div class="sidebar-footer">
                <button id="scanBtn" class="btn btn-sm" data-i18n="scanBtn">扫描 PDF / ZIP</button>
                <button id="refreshBtn" class="btn btn-sm" data-i18n="refreshBtn">刷新目录</button>
            </div>
        </aside>

        <main class="content">
            <div id="selectionInfo" class="selection-info">
                <p data-i18n="selectionInfo">请在左侧选择一个目录或文件</p>
            </div>

            <section id="pdfPage" class="tool-page active">
                <div class="tabs">
                    <button class="tab active" data-tab="resize" data-i18n="tab.resize">页面缩放</button>
                    <button class="tab" data-tab="delete" data-i18n="tab.delete">页面删除</button>
                    <button class="tab" data-tab="extract" data-i18n="tab.extract">页面提取</button>
                    <button class="tab" data-tab="metadata" data-i18n="tab.metadata">元数据</button>
                    <button class="tab" data-tab="zip2pdf" data-i18n="tab.zip2pdf">ZIP 转 PDF</button>
                    <div class="tab-clean">
                        <button class="btn btn-sm btn-danger clean-btn" data-clean-type="backup_resize" data-i18n="cleanType.backup_resize">清理缩放备份</button>
                        <button class="btn btn-sm btn-danger clean-btn" data-clean-type="backup_page_ops" data-i18n="cleanType.backup_page_ops">清理页面备份</button>
                        <button class="btn btn-sm btn-danger clean-btn" data-clean-type="zip" data-i18n="cleanType.zip">清理 ZIP</button>
                    </div>
                </div>

                <div class="pdf-preview-pane">
                    <div class="image-preview-head">
                        <div><strong id="pdfPreviewName" data-i18n="pdfPreviewName">未选择 PDF</strong></div>
                        <span class="image-preview-dims" id="pdfPreviewDims">-</span>
                    </div>
                    <div id="previewPlaceholder" class="preview-placeholder">
                        <p data-i18n="previewPlaceholder">选择左侧目录中的 PDF 文件即可预览</p>
                    </div>
                    <div id="previewContainer" class="preview-container hidden">
                        <div class="preview-info" id="previewInfo"></div>
                        <iframe id="previewFrame" class="preview-frame"></iframe>
                    </div>
                </div>

                <div class="pdf-panel-stack">
                    <div class="tab-panel active pdf-tool-panel" id="panel-resize">
                        <div class="image-tool-header"><h3 data-i18n="panel-resize.h3">页面缩放</h3></div>
                        <div class="resize-size-row">
                            <div class="form-group">
                                <label data-i18n="resizeWidth.label">目标宽度 (mm)</label>
                                <input type="number" id="resizeWidth" value="210" step="0.1">
                            </div>
                            <div class="form-group">
                                <label data-i18n="resizeHeight.label">目标高度 (mm)</label>
                                <input type="number" id="resizeHeight" value="297" step="0.1">
                            </div>
                        </div>
                        <div class="form-group checkbox-group">
                            <label><input type="checkbox" id="resizeStrip"> <span data-i18n="resizeStrip.label">条形漫画模式（仅固定宽度，高度自适应）</span></label>
                        </div>
                        <div class="action-row">
                            <button class="btn btn-primary" id="resizeBtn" data-i18n="resizeBtn">执行缩放</button>
                        </div>
                    </div>

                    <div class="tab-panel pdf-tool-panel" id="panel-delete">
                        <div class="image-tool-header"><h3 data-i18n="panel-delete.h3">页面删除</h3></div>
                        <div class="form-group">
                            <label data-i18n="deleteMode.label">删除模式</label>
                            <div class="segmented-control segmented-3col" id="deleteMode">
                                <button class="segmented-option active" data-value="single" data-i18n="deleteMode.single">单页</button>
                                <button class="segmented-option" data-value="range" data-i18n="deleteMode.range">前/后N页</button>
                                <button class="segmented-option" data-value="range-se" data-i18n="deleteMode.range-se">页码范围</button>
                            </div>
                        </div>
                        <div class="resize-size-row">
                            <div class="form-group" id="deleteCountGroup">
                                <label data-i18n="deleteCount.label">页码 / 页数</label>
                                <input type="number" id="deleteCount" value="1" min="1">
                            </div>
                            <div class="form-group" id="deleteBackGroup">
                                <label data-i18n="deleteBack.label">方向</label>
                                <div class="segmented-control" id="deleteBack">
                                    <button type="button" class="segmented-option active" data-value="front" data-i18n="deleteBack.front">前</button>
                                    <button type="button" class="segmented-option" data-value="back" data-i18n="deleteBack.back">后</button>
                                </div>
                            </div>
                            <div class="form-group hidden" id="deleteStartGroup">
                                <label data-i18n="deleteStart.label">起始页</label>
                                <input type="number" id="deleteStart" value="1" min="1">
                            </div>
                            <div class="form-group hidden" id="deleteEndGroup">
                                <label data-i18n="deleteEnd.label">结束页</label>
                                <input type="number" id="deleteEnd" value="1" min="1">
                            </div>
                        </div>
                        <div class="action-row">
                            <button class="btn btn-primary" id="deleteBtn" data-i18n="deleteBtn">执行删除</button>
                        </div>
                    </div>

                    <div class="tab-panel pdf-tool-panel" id="panel-extract">
                        <div class="image-tool-header"><h3 data-i18n="panel-extract.h3">页面提取</h3></div>
                        <div class="form-group">
                            <label data-i18n="extractMode.label">提取模式</label>
                            <div class="segmented-control" id="extractMode">
                                <button class="segmented-option active" data-value="png" data-i18n="extractMode.png">→ PNG</button>
                                <button class="segmented-option" data-value="pdf" data-i18n="extractMode.pdf">→ PDF</button>
                            </div>
                        </div>
                        <div class="form-group" id="extractDpiGroup">
                            <label data-i18n="extractDpi.label">DPI 模式</label>
                            <div class="segmented-control" id="extractDpi">
                                <button class="segmented-option active" data-value="bw" data-i18n="extractDpi.bw">黑白</button>
                                <button class="segmented-option" data-value="color" data-i18n="extractDpi.color">彩色</button>
                            </div>
                        </div>
                        <div class="resize-size-row">
                            <div class="form-group" id="extractPageGroup">
                                <label data-i18n="extractPage.label">页码</label>
                                <input type="number" id="extractPage" value="1" min="1">
                            </div>
                            <div class="form-group hidden" id="extractStartGroup">
                                <label data-i18n="extractStart.label">起始页</label>
                                <input type="number" id="extractStart" value="1" min="1">
                            </div>
                            <div class="form-group hidden" id="extractEndGroup">
                                <label data-i18n="extractEnd.label">结束页</label>
                                <input type="number" id="extractEnd" value="1" min="1">
                            </div>
                        </div>
                        <div class="action-row">
                            <button class="btn btn-primary" id="extractBtn" data-i18n="extractBtn">执行提取</button>
                        </div>
                    </div>

                    <div class="tab-panel pdf-tool-panel" id="panel-metadata">
                        <div class="image-tool-header"><h3 data-i18n="panel-metadata.h3">元数据</h3></div>
                        <div id="metadataPlaceholder" class="metadata-placeholder">
                            <p data-i18n="metadataPlaceholder">请先在左侧选择一个 PDF 文件</p>
                        </div>
                        <div id="metadataForm" class="metadata-form hidden">
                            <div class="metadata-file" id="metadataFileInfo"></div>
                            <div class="resize-size-row">
                                <div class="form-group">
                                    <label data-i18n="metaTitle.label">标题</label>
                                    <input type="text" id="metaTitle" placeholder="Title">
                                </div>
                                <div class="form-group">
                                    <label data-i18n="metaAuthor.label">作者</label>
                                    <input type="text" id="metaAuthor" placeholder="Author">
                                </div>
                            </div>
                            <div class="resize-size-row">
                                <div class="form-group">
                                    <label data-i18n="metaSubject.label">主题</label>
                                    <input type="text" id="metaSubject" placeholder="Subject">
                                </div>
                                <div class="form-group">
                                    <label data-i18n="metaKeywords.label">关键词</label>
                                    <input type="text" id="metaKeywords" placeholder="Keywords">
                                </div>
                            </div>
                            <div class="resize-size-row">
                                <div class="form-group">
                                    <label data-i18n="metaCreator.label">创建程序</label>
                                    <input type="text" id="metaCreator" placeholder="Creator">
                                </div>
                                <div class="form-group">
                                    <label data-i18n="metaProducer.label">生成程序</label>
                                    <input type="text" id="metaProducer" placeholder="Producer">
                                </div>
                            </div>
                            <div class="action-row">
                                <button class="btn btn-primary" id="metadataSaveBtn" data-i18n="metadataSaveBtn">保存元数据</button>
                                <button class="btn" id="metadataReloadBtn" data-i18n="metadataReloadBtn">重新读取</button>
                            </div>
                            <div id="metadataStatus" class="metadata-status"></div>
                        </div>
                    </div>

                    <div class="tab-panel pdf-tool-panel" id="panel-zip2pdf">
                        <div class="image-tool-header"><h3 data-i18n="panel-zip2pdf.h3">ZIP 转 PDF</h3></div>
                        <div class="form-group">
                            <label data-i18n="zipDpi.label">DPI 模式</label>
                            <div class="segmented-control" id="zipDpi">
                                <button class="segmented-option active" data-value="bw" data-i18n="zipDpi.bw">黑白</button>
                                <button class="segmented-option" data-value="color" data-i18n="zipDpi.color">彩色</button>
                            </div>
                        </div>
                        <div class="action-row">
                            <button class="btn btn-primary" id="zip2pdfBtn" data-i18n="zip2pdfBtn">执行转换</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="imagePage" class="tool-page">
                <div class="tabs">
                    <button class="tab active" data-image-tab="resize" data-i18n="tab.image.resize">图片拉伸</button>
                    <button class="tab" data-image-tab="merge" data-i18n="tab.image.merge">图片合并</button>
                    <button class="tab" data-image-tab="crop" data-i18n="tab.image.crop">图片截取</button>
                    <button class="tab" data-image-tab="convert" data-i18n="tab.image.convert">格式转换</button>
                    <button class="tab" data-image-tab="compress" data-i18n="tab.image.compress">大小压缩</button>
                    <div class="tab-clean">
                        <button class="btn btn-sm btn-danger clean-btn" data-clean-type="output_images" data-i18n="cleanType.output_images">清理输出</button>
                    </div>
                </div>

                <div class="image-preview-pane">
                    <div class="image-preview-head">
                        <div><strong id="imagePreviewName" data-i18n="imagePreviewName">未选择图片</strong></div>
                        <span class="image-preview-dims">
                            <span id="imageResizeOrigW">-</span> x <span id="imageResizeOrigH">-</span> px
                        </span>
                    </div>
                    <div id="imagePreviewEmpty" class="image-preview-empty">
                        <p data-i18n="imagePreviewEmpty">请先在左侧选择一张图片文件</p>
                    </div>
                    <div id="imagePreviewFrame" class="image-preview-frame hidden">
                        <img id="imageResizePreview" alt="">
                    </div>
                    <div id="imageCropPreview" class="image-crop-preview hidden">
                        <div id="imageCropPlaceholder" class="crop-placeholder">
                            <p data-i18n="imageCropPlaceholder">选择左侧图片后即可拖拽框选</p>
                        </div>
                        <div id="imageCropStageWrap" class="crop-stage-wrap hidden">
                            <div id="imageCropStage" class="crop-stage">
                                <img id="imageCropImage" alt="">
                                <div id="imageCropBox" class="crop-box hidden">
                                    <span class="crop-handle crop-handle-nw" data-handle="nw"></span>
                                    <span class="crop-handle crop-handle-n" data-handle="n"></span>
                                    <span class="crop-handle crop-handle-ne" data-handle="ne"></span>
                                    <span class="crop-handle crop-handle-e" data-handle="e"></span>
                                    <span class="crop-handle crop-handle-se" data-handle="se"></span>
                                    <span class="crop-handle crop-handle-s" data-handle="s"></span>
                                    <span class="crop-handle crop-handle-sw" data-handle="sw"></span>
                                    <span class="crop-handle crop-handle-w" data-handle="w"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="image-panel-stack">
                    <div class="tab-panel active image-tool-panel" id="image-panel-resize">
                        <div class="image-tool-header"><h3 data-i18n="image-panel-resize.h3">图片拉伸</h3></div>
                        <div class="form-group">
                            <label data-i18n="imageResizeMode.label">调整方式</label>
                            <div class="segmented-control">
                                <button class="segmented-option active" data-resize-mode="pixel" data-i18n="imageResizeMode.pixel">按像素</button>
                                <button class="segmented-option" data-resize-mode="percent" data-i18n="imageResizeMode.percent">按百分比</button>
                            </div>
                        </div>
                        <div class="resize-size-row">
                            <div class="form-group">
                                <label id="imageResizeWidthLabel" data-i18n="imageResizeWidthLabel">宽度 (px)</label>
                                <input type="number" id="imageResizeWidthPct" value="100" min="1" max="20000" step="1">
                            </div>
                            <div class="form-group">
                                <label id="imageResizeHeightLabel" data-i18n="imageResizeHeightLabel">高度 (px)</label>
                                <input type="number" id="imageResizeHeightPct" value="100" min="1" max="20000" step="1">
                            </div>
                        </div>
                        <div class="checkbox-list resize-checks">
                            <label><input type="checkbox" id="imageResizeKeepRatio" checked> <span data-i18n="imageResizeKeepRatio">保持比例</span></label>
                            <label><input type="checkbox" id="imageResizeNoEnlarge"> <span data-i18n="imageResizeNoEnlarge">不放大</span></label>
                        </div>
                        <div class="image-resize-summary">
                            <div>
                                <span class="image-resize-summary-label" data-i18n="imageResizeSummary.size">输出尺寸</span>
                                <strong><span id="imageResizeCalcW">-</span> x <span id="imageResizeCalcH">-</span> px</strong>
                            </div>
                            <div>
                                <span class="image-resize-summary-label" data-i18n="imageResizeSummary.ratio">输出比例</span>
                                <strong id="imageResizeCalcRatio">-</strong>
                            </div>
                        </div>
                        <div class="action-row">
                            <button class="btn btn-primary" id="imageResizeBtn" data-i18n="imageResizeBtn">保存拉伸图片</button>
                            <button class="btn" id="imageResizeResetBtn" data-i18n="imageResizeResetBtn">重置设置</button>
                        </div>
                    </div>

                    <div class="tab-panel image-tool-panel" id="image-panel-merge">
                        <div class="image-tool-header"><h3 data-i18n="image-panel-merge.h3">图片合并</h3></div>
                        <div class="form-group">
                            <label data-i18n="imageMergeMode.label">合并方式</label>
                            <div class="segmented-control segmented-3col" id="imageMergeMode">
                                <button class="segmented-option active" data-value="grid" data-i18n="imageMergeMode.grid">九宫格</button>
                                <button class="segmented-option" data-value="vertical" data-i18n="imageMergeMode.vertical">上下</button>
                                <button class="segmented-option" data-value="horizontal" data-i18n="imageMergeMode.horizontal">左右</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="checkbox-inline"><input type="checkbox" id="imageMergeBorder"> <span data-i18n="imageMergeBorder">添加边框 / 间距</span></label>
                        </div>
                        <div class="action-row">
                            <button class="btn btn-primary" id="imageMergeBtn" data-i18n="imageMergeBtn">合并当前目录图片</button>
                        </div>
                    </div>

                    <div class="tab-panel image-tool-panel" id="image-panel-crop">
                        <div class="image-tool-header"><h3 data-i18n="image-panel-crop.h3">图片截取</h3></div>
                        <div class="form-group">
                            <label data-i18n="imageCropRatio.label">截取比例</label>
                            <div class="segmented-control image-crop-ratio-grid" id="imageCropRatio">
                                <button class="segmented-option active" data-crop-ratio="free" data-i18n="imageCropRatio.free">自由</button>
                                <button class="segmented-option" data-crop-ratio="1:1">1:1</button>
                                <button class="segmented-option" data-crop-ratio="a4p" data-i18n="imageCropRatio.a4p">A4 竖</button>
                                <button class="segmented-option" data-crop-ratio="a4l" data-i18n="imageCropRatio.a4l">A4 横</button>
                                <button class="segmented-option" data-crop-ratio="16:9">16:9</button>
                                <button class="segmented-option" data-crop-ratio="4:3">4:3</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label data-i18n="imageCropZoom.label">预览缩放</label>
                            <div class="image-crop-zoom-row">
                                <input type="range" id="imageCropZoom" class="crop-zoom" min="50" max="300" value="100" step="10">
                                <button class="btn btn-sm" id="imageCropZoomResetBtn">100%</button>
                                <span id="imageCropZoomLabel" class="crop-zoom-label">100%</span>
                            </div>
                        </div>
                        <div class="action-row image-crop-action-row">
                            <button class="btn btn-primary" id="imageCropSaveBtn" data-i18n="imageCropSaveBtn">保存截取 PNG</button>
                        </div>
                    </div>

                    <div class="tab-panel image-tool-panel" id="image-panel-convert">
                        <div class="image-tool-header"><h3 data-i18n="image-panel-convert.h3">格式转换</h3></div>
                        <div class="image-options-grid">
                            <div class="form-group">
                                <label data-i18n="imageConvertScope.label">处理范围</label>
                                <div class="segmented-control" id="imageConvertScope">
                                    <button class="segmented-option active" data-value="selected" data-i18n="imageConvertScope.selected">当前选中</button>
                                    <button class="segmented-option" data-value="all" data-i18n="imageConvertScope.all">全部图片</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="imageConvertFormat.label">目标格式</label>
                                <div class="segmented-control segmented-3col" id="imageConvertFormat">
                                    <button class="segmented-option active" data-value="png">PNG</button>
                                    <button class="segmented-option" data-value="jpg">JPG</button>
                                    <button class="segmented-option" data-value="webp">WEBP</button>
                                </div>
                            </div>
                        </div>
                        <div class="action-row">
                            <button class="btn btn-primary" id="imageConvertBtn" data-i18n="imageConvertBtn">执行格式转换</button>
                        </div>
                    </div>

                    <div class="tab-panel image-tool-panel" id="image-panel-compress">
                        <div class="image-tool-header"><h3 data-i18n="image-panel-compress.h3">大小压缩</h3></div>
                        <div class="image-options-grid">
                            <div class="form-group">
                                <label data-i18n="imageCompressScope.label">处理范围</label>
                                <div class="segmented-control" id="imageCompressScope">
                                    <button class="segmented-option active" data-value="selected" data-i18n="imageCompressScope.selected">当前选中</button>
                                    <button class="segmented-option" data-value="all" data-i18n="imageCompressScope.all">全部图片</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label data-i18n="imageCompressQuality.label">质量 (1-100)</label>
                                <input type="number" id="imageCompressQuality" value="75" min="1" max="100">
                            </div>
                        </div>
                        <div class="form-group">
                            <label data-i18n="imageCompressMaxSide.label">最长边限制 (px，可留空)</label>
                            <input type="number" id="imageCompressMaxSide" min="1" data-i18n-placeholder="imageCompressMaxSide.placeholder" placeholder="不缩放">
                        </div>
                        <div class="form-group">
                            <label data-i18n="imageCompressTargetKb.label">压缩到小于 (KB，可留空)</label>
                            <input type="number" id="imageCompressTargetKb" min="1" data-i18n-placeholder="imageCompressTargetKb.placeholder" placeholder="例如 500">
                        </div>
                        <div class="checkbox-list">
                            <label><input type="checkbox" id="imageCompressBestQuality"> <span data-i18n="imageCompressBestQuality">在目标大小内保持最好质量</span></label>
                        </div>
                        <div class="action-row">
                            <button class="btn btn-primary" id="imageCompressBtn" data-i18n="imageCompressBtn">执行压缩</button>
                        </div>
                    </div>
                </div>
            </section>

            <div class="log-section">
                <div class="log-header">
                    <h3 data-i18n="log.title">运行日志</h3>
                    <button id="clearLogBtn" class="btn btn-sm" data-i18n="clearLogBtn">清空</button>
                </div>
                <div id="logOutput" class="log-output">
                    <div class="log-line log-line-muted">
                        <span class="log-icon">i</span>
                        <span class="log-message" data-i18n="log.waiting">等待操作...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
